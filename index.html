<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://pyscript.net/releases/2025.7.3/core.css"/>
    <script type="module" src="https://pyscript.net/releases/2025.7.3/core.js"></script>
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
     <link rel="stylesheet" href="style.css">
    <title>Skills Test</title>
    <py-config>
        packages = ['numpy','matplotlib']
    </py-config>
    </head>
    <body>
        <div class="card card-custom shadow-lg p-4" style="width: 400px;">
        <h3 class="text-center title-text mb-4">Attendance Tracker</h3>
            <form>
                <div class="mb-3"
                <label class="form-label">Select Day</label>
                <select id="DayOfTheWeek" class="form-select"> 
                <option value="Mon">Monday</option>
                <option value="Tue">Tuesday</option>
                <option value="Wed">Wednesday</option>
                <option value="Thurs">Thursday</option>
                <option value="Fri">Friday</option></select>
               <div class="mb-3">
                <label class="form-label">Absences</label>
                <input type="number" id="absences" class="form-control" placeholder="enter number of absences">
               </div>
               <div class="mb-3">
                 <input type="button" py-click="Wallahi" value="Submit" class="btn btn-danger">
               </div>
            </form>
    <div id="output"></div>
    <py-script src="main.py"></py-script>
    </body>
    </html>
